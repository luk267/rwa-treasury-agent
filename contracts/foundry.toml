[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib"]

solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

# See https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
